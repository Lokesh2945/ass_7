<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSS Selectors Example</title>


    <!-- Link CSS File -->
    <link rel="stylesheet" href="sample.css">
</head>
<body>

    <!-- ID Selector -->
    <h1 id="header">Welcome to CSS Selectors</h1>

    <!-- Element Selector + Class Selector -->
    <p class="intro">
        This paragraph uses the element selector and the intro class.
    </p>

    <!-- Element Selector + Highlight Class -->
    <p class="highlight">
        This paragraph has a highlighted background.
    </p>

    <!-- Box Class -->
    <div class="box">
        <p>This paragraph is inside a box.</p>
    </div>

</body>
</html>
